local_backend: true

backend:
  name: git-gateway
  branch: main

collections:
  - name: "blog"
    label: "Blog Post"
    folder: "content/blog"
    create: true
    slug: "{{year}}/{{month}}/{{slug}}"
    media_folder: "assets/images/posts/{{year}}/{{month}}/{{slug}}"
    public_folder: "/images/posts/{{year}}/{{month}}/{{slug}}"
    nested:
      depth: 3
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Categories", name: "categories", widget: "list" }
      - { label: "Date", name: "date", widget: "datetime", default: "{{now}}" }
      - { label: "Description", name: "description", widget: "string", required: false }
      - { label: "Tags", name: "tags", widget: "list", required: false }
      - { label: "Cover", name: "cover", widget: "image", required: false }
      - { label: "Cover Image Credits", name: "credits", widget: "string", required: false }
      - { label: "Comments", name: "comments", widget: "boolean", required: false }
      - { label: "Disclaimer", name: "disclaimer", widget: "string", required: false }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "photos"
    label: "Photos"
    folder: "content/photos"
    create: true
    slug: "{{year}}/{{month}}/{{slug}}"
    media_folder: "assets/images/photos/{{year}}/{{month}}/{{slug}}"
    public_folder: "/images/photos/{{year}}/{{month}}/{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Draft", name: "draft", widget: "boolean", default: true }
      - { label: "Location", name: "location", widget: "string", required: false }
      - { label: "Camera", name: "camera", widget: "string", required: false }
      - label: "Cover"
        name: "cover"
        widget: "image"
        required: false
      - label: "Photos"
        name: "photos"
        widget: "list"
        required: false
        fields:
          - { label: "Image", name: "image", widget: "image" }
          - { label: "Caption", name: "caption", widget: "string", required: false }
      - { label: "Body", name: "body", widget: "markdown", required: false }

  - name: "snippets"
    label: "Snippets"
    folder: "content/snippets"
    create: true
    slug: "{{slug}}"
    media_folder: "assets/images/snippets/{{slug}}"
    public_folder: "/images/snippets/{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Draft", name: "draft", widget: "boolean", default: true }
      - { label: "Language", name: "language", widget: "string" }
      - { label: "Description", name: "description", widget: "string", required: false }
      - { label: "Tags", name: "tags", widget: "list", required: false }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "picks"
    label: "Picks"
    folder: "content/picks"
    create: true
    slug: "{{slug}}"
    media_folder: "assets/images/picks/{{slug}}"
    public_folder: "/images/picks/{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Draft", name: "draft", widget: "boolean", default: true }
      - label: "Medium"
        name: "medium"
        widget: "select"
        options: ["movie", "series", "music", "book", "game", "podcast", "other"]
      - { label: "Creator", name: "creator", widget: "string", required: false }
      - { label: "Year", name: "year", widget: "string", required: false }
      - {
          label: "Rating",
          name: "rating",
          widget: "select",
          options: ["★", "★★", "★★★", "★★★★", "★★★★★"],
          required: false,
        }
      - { label: "Cover", name: "cover", widget: "image", required: false }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Tags", name: "tags", widget: "list", required: false }
      - { label: "Body", name: "body", widget: "markdown", required: false }
