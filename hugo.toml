baseURL = "https://diogomoreira.dev/"
defaultContentLanguage = 'en'
title = "Diogo Moreira"
titleCaseStyle = "none"

[languages]
[languages.en]
disabled = false
label = 'English'
locale = 'en-US'

[params]
version = "4.3.0"
description = "My thoughts about life, software development, music and so forth."
cover = "images/default-cover.png"

[build]
[build.buildStats]
enable = true
[[build.cachebusters]]
source = 'assets/notwatching/hugo_stats\.json'
target = 'css'
[[build.cachebusters]]
source = '(postcss|tailwind)\.config\.js'
target = 'css'
[module]
[[module.mounts]]
source = 'assets'
target = 'assets'
[[module.mounts]]
disableWatch = true
source = 'hugo_stats.json'
target = 'assets/notwatching/hugo_stats.json'
[[module.mounts]]
source = "node_modules/photoswipe/dist"
target = "assets/photoswipe"

[markup]
[markup.highlight]
style = "github-dark" # or dracula, monokai, nord, etc.
lineNos = true
anchorLineNos = true

codeFences = true
[markup.goldmark]
[markup.goldmark.renderer]
unsafe = true # allows raw HTML in Markdown

[outputs]
home = ["HTML"]
page = ["HTML"]
section = ["HTML", "RSS"]

[taxonomies]
tag = "tags"
category = "categories"

# Optional: set default params per section
[params.blog]
dateFormat = "January 2, 2006"

[[params.social]]
name = "GitHub"
url = "https://github.com/diogomoreira"
icon = "github"

[[params.social]]
name = "LinkedIn"
url = "https://linkedin.com/in/diogodmoreira"
icon = "linkedin"

[[params.social]]
name = "Mastodon"
handle = "@diogomoreira@hachyderm.io"
url = "https://hachyderm.io/@diogomoreira"
icon = "mastodon"

[[params.social]]
name = "Email"
url = "mailto:diogo.dmoreira@gmail.com"
icon = "email"

[[params.social]]
name = "Instagram"
url = "https://instagram.com/diogo.dmoreira"
icon = "instagram"

[params.giscus]
