{{ define "main" }}
  {{ partial "header.html" . }}

  {{ with .Content }}
    <div class="prose prose-headings:font-sans max-w-prose">{{ . }}</div>
  {{ end }}

  {{ if .Pages }}
    {{ partial "page-list.html" .Pages }}
  {{ else }}
    {{ partial "empty-state.html" "Nothing here yet." }}
  {{ end }}
{{ end }}
