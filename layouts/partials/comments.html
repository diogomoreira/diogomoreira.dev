{{ if and .Site.Params.giscus.repo (.Params.comments | default false) }}
  {{ $g := .Site.Params.giscus }}
  <section class="mt-16 pt-8 border-t border-base-300">
    <h2 class="text-sm font-semibold text-secondary uppercase tracking-widest mb-6">Comments</h2>
    <div class="giscus-container"></div>
  <script>
    (function () {
      const stored = localStorage.getItem("theme");
      const preferred = globalThis.matchMedia("(prefers-color-scheme: dark)").matches ? "midnight" : "sunrise";
      const current = stored || preferred;
      const giscusTheme = current === "midnight" ? "dark" : "light";

      const script = document.createElement("script");
      script.src = "https://giscus.app/client.js";
      script.dataset.repo = "{{ $g.repo }}";
      script.dataset.repoId = "{{ $g.repoId }}";
      script.dataset.category = "{{ $g.category }}";
      script.dataset.categoryId = "{{ $g.categoryId }}";
      script.dataset.mapping = "{{ $g.mapping }}";
      script.dataset.strict = "{{ $g.strict }}";
      script.dataset.reactionsEnabled = "{{ $g.reactionsEnabled }}";
      script.dataset.emitMetadata = "{{ $g.emitMetadata }}";
      script.dataset.inputPosition = "{{ $g.inputPosition }}";
      script.dataset.theme = giscusTheme;
      script.dataset.lang = "{{ $g.lang }}";
      script.setAttribute("crossorigin", "anonymous");
      script.async = true;
      script.defer = true;

      document.querySelector(".giscus-container").appendChild(script);
    })();
  </script>
  </section>
{{ end }}
