<header class="border-b border-base-300 bg-base-100">
  <div class="w-full max-w-4xl mx-auto px-6 py-4 flex items-center justify-between">
    <a href="/" class="text-sm font-semibold tracking-tight text-base-content hover:opacity-70 transition-opacity">
      <div class="flex items-center gap-6">
        {{ with resources.Get "images/logo.png" }}
          {{ with .Resize "32x" }}
            <img class="w-8 h-8" src="{{ .RelPermalink }}" width="{{ .Width }}" height="{{ .Height }}" />
          {{ end }}

        {{ end }}


        <span class="font-[Hubot_Sans]">{{ .Site.Title }}</span>
      </div>
    </a>

    <div class="flex items-center gap-6">
      <nav>
        <ul class="flex items-center gap-5 font-[Hubot_Sans] list-none m-0 p-0">
          {{ range .Site.Menus.main }}
            <li>
              <a
                href="{{ .URL }}"
                class="text-sm text-base-content/60 hover:text-base-content transition-colors
                        {{ if $.IsMenuCurrent `main` . }}!text-base-content font-medium{{ end }}"
              >
                {{ .Name }}
              </a>
            </li>
          {{ end }}
        </ul>
      </nav>

      <button id="theme-toggle" aria-label="Toggle dark mode" class="btn btn-ghost btn-sm btn-square">
        <svg
          id="icon-sun"
          xmlns="http://www.w3.org/2000/svg"
          width="15"
          height="15"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          class="hidden"
        >
          <circle cx="12" cy="12" r="4" />
          <path
            d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"
          />
        </svg>
        <svg
          id="icon-moon"
          xmlns="http://www.w3.org/2000/svg"
          width="15"
          height="15"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" />
        </svg>
      </button>
    </div>
  </div>
</header>
