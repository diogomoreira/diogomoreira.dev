{{ with .Site.Params.social }}
  <div class="flex justify-center items-center mb-6 gap-4 text-content">
    {{ range . }}
      <a
        href="{{ .url }}"
        target="{{ if not (hasPrefix .url " /") }}_blank{{ end }}"
        rel="me"
        class="flex items-center text-content hover:text-content "
      >
        <span class="w-6 h-6">
          {{ partial (printf "icons/social/%s.html" .icon) $ }}
        </span>
        <span class="sr-only">{{ .name }}</span>
      </a>
    {{ end }}
  </div>
{{ end }}
