{{ define "main" }}
  {{ partial "header.html" . }}

  {{ if .Pages }}
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
      {{ range .Pages.ByDate.Reverse }}
        <a
          href="{{ .RelPermalink }}"
          class="group card bg-base-100 border border-base-300 hover:border-primary  overflow-hidden"
        >
          <div class="card-body p-4 flex-row items-center justify-between gap-2">
            <div class="min-w-0">
              <span class="block text-sm font-medium text-base-content truncate">
                {{ .Title }}
              </span>
              {{ with .Params.description }}
                <span class="block text-xs text-secondary truncate mt-0.5">{{ . }}</span>
              {{ end }}
            </div>
            {{ with .Params.language }}
              <span class="badge badge-sm font-mono shrink-0">{{ . }}</span>
            {{ end }}
          </div>
        </a>
      {{ end }}
    </div>
  {{ else }}
    <p class="bg-base-200 p-10 text-center text-sm text-secondary">Nothing here yet.</p>
  {{ end }}
{{ end }}
